<style>
  /* Keep the kiosk self-contained; surf will use local sans-serif fonts. */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#080808; cursor:none; }
  /* The stage is authored at a fixed 1920x1080 so every animation coordinate
     stays exact; #screen scales that canvas to fit whatever viewport it loads
     in (letterboxed). The transform also makes the fixed children below anchor
     to this box instead of the raw viewport. */
  #screen { position:fixed; top:50%; left:50%; width:1920px; height:1080px; transform-origin:center center; transform:translate(-50%,-50%); }
  #particles-canvas { position:fixed; top:0; left:0; width:1920px; height:1080px; pointer-events:none; z-index:0; }
  #stage { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center; gap:100px; z-index:10; }
  .logo-block { width:240px; display:flex; flex-direction:column; align-items:center; gap:22px; }
  #icon-wrap { width:158px; height:158px; position:relative; display:flex; align-items:center; justify-content:center; }
  #logo-svg { position:absolute; top:0; left:0; width:158px; height:158px; filter:none; }
  #icon-canvas { position:absolute; top:0; left:0; width:158px; height:158px; opacity:0; }
  #brand-strip { width:228px; height:58px; position:relative; display:flex; align-items:center; justify-content:center; }
  #brand-wordmark { position:absolute; width:228px; height:58px; opacity:0.96; transition:opacity 0.35s; }
  .tagline { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'DM Sans',sans-serif; font-weight:300; font-size:14px; letter-spacing:0.44em; text-transform:uppercase; color:rgba(255,255,255,0); white-space:nowrap; height:18px; transition:color 0.35s; }
  .divider { width:1px; height:280px; background:linear-gradient(to bottom,transparent,rgba(255,198,0,0.32) 25%,rgba(255,198,0,0.32) 75%,transparent); flex-shrink:0; }
  .clock-block { display:flex; flex-direction:column; align-items:center; gap:20px; }
  .time-digital { font-family:'Nunito',sans-serif; font-weight:600; font-size:44px; letter-spacing:0.04em; color:rgba(255,255,255,0.88); line-height:1; white-space:nowrap; }
  .time-digital .ampm { font-size:17px; font-weight:300; color:rgba(255,255,255,0.38); margin-left:6px; vertical-align:middle; }
  .date-line { font-family:'DM Sans',sans-serif; font-weight:300; font-size:15px; letter-spacing:0.36em; text-transform:uppercase; color:rgba(255,255,255,0.32); white-space:nowrap; }
</style>

<script>
// Scale the fixed 1920x1080 stage to fit the current viewport (letterboxed).
function fitScreen(){
  const s=Math.min(innerWidth/1920,innerHeight/1080);
  document.getElementById('screen').style.transform=`translate(-50%,-50%) scale(${s})`;
}
fitScreen();addEventListener('resize',fitScreen);

const ic=document.getElementById('icon-canvas'),ictx=ic.getContext('2d');
const logoSVG=document.getElementById('logo-svg'),lbl=document.getElementById('tagline'),brandWordmark=document.getElementById('brand-wordmark');
const CW=220,CH=220,CM=110,Y='#FFC600';

function lerp(a,b,t){return a+(b-a)*t;}
function eio(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
function eout(t){return 1-(1-t)*(1-t);}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

const params=new URLSearchParams(location.search);
const TARGET_FPS=clamp(Number(params.get('fps'))||40,15,60);
const FRAME_MS=1000/TARGET_FPS;
const PARTICLE_COUNT=clamp(Number(params.get('particles'))||72,0,160);

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const rr=(Array.isArray(r)?r:[r,r,r,r]).map(v=>Math.max(0,Number(v)||0));
    const tl=Math.min(rr[0],Math.abs(w)/2,Math.abs(h)/2);
    const tr=Math.min(rr[1],Math.abs(w)/2,Math.abs(h)/2);
    const br=Math.min(rr[2],Math.abs(w)/2,Math.abs(h)/2);
    const bl=Math.min(rr[3],Math.abs(w)/2,Math.abs(h)/2);
    this.moveTo(x+tl,y);
    this.lineTo(x+w-tr,y);this.quadraticCurveTo(x+w,y,x+w,y+tr);
    this.lineTo(x+w,y+h-br);this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
    this.lineTo(x+bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-bl);
    this.lineTo(x,y+tl);this.quadraticCurveTo(x,y,x+tl,y);
    return this;
  };
}

function showBrandWordmark(a){brandWordmark.style.opacity=String(a);lbl.textContent=' ';lbl.style.color='rgba(255,255,255,0)';}
function setLabel(txt,a){lbl.textContent=txt||' ';lbl.style.color=txt?`rgba(255,198,0,${a})`:'rgba(255,255,255,0)';}

function prep(lw,blur){
  ictx.strokeStyle=Y;ictx.fillStyle=Y;ictx.lineWidth=lw||7;
  ictx.lineCap='round';ictx.lineJoin='round';
  ictx.shadowColor='transparent';ictx.shadowBlur=0;
}

// -- LAPTOP --
function drawLaptop(ox,openP,sc,al){
  ictx.save();ictx.globalAlpha=al;
  ictx.translate(CM+ox,CM+4);ictx.scale(sc,sc);
  const open=eout(clamp(openP,0,1));
  const hingeY=18,screenW=82,screenH=58*open+3;
  // Screen rises out of the hinge so the opening motion reads clearly.
  ictx.save();
  ictx.translate(0,hingeY);
  prep(6,18);
  ictx.fillStyle=`rgba(255,198,0,${0.07+open*0.1})`;
  ictx.beginPath();ictx.roundRect(-screenW/2,-screenH-5,screenW,screenH,7);ictx.fill();ictx.stroke();
  prep(3,8);
  ictx.strokeStyle=`rgba(255,198,0,${0.35+open*0.45})`;
  ictx.beginPath();ictx.roundRect(-screenW/2+8,-screenH+4,screenW-16,Math.max(8,screenH-18),4);ictx.stroke();
  ictx.restore();

  // Keyboard deck
  prep(6,14);
  ictx.fillStyle='rgba(255,198,0,0.11)';
  ictx.beginPath();
  ictx.moveTo(-45,hingeY+3);ictx.lineTo(45,hingeY+3);
  ictx.lineTo(61,hingeY+29);ictx.lineTo(-61,hingeY+29);ictx.closePath();
  ictx.fill();ictx.stroke();
  prep(4,8);
  ictx.beginPath();ictx.moveTo(-40,hingeY+9);ictx.lineTo(40,hingeY+9);ictx.stroke();
  prep(3,5);
  for(let r=0;r<2;r++){
    for(let c=0;c<6;c++){
      ictx.beginPath();
      ictx.roundRect(-34+c*13,hingeY+14+r*6,8,3,2);
      ictx.stroke();
    }
  }
  ictx.beginPath();ictx.roundRect(-14,hingeY+25,28,7,3);ictx.stroke();
  ictx.restore();
}

// -- PHONE HANDSET --
function drawPhone(ox,waveP,al){
  ictx.save();ictx.globalAlpha=al;ictx.translate(CM+ox,CM);
  // Classic handset silhouette
  prep(8,22);
  ictx.fillStyle=Y;
  ictx.beginPath();
  ictx.moveTo(-50,-18);
  ictx.bezierCurveTo(-45,-36,-26,-42,-12,-30);
  ictx.bezierCurveTo(-7,-25,-8,-16,-14,-12);
  ictx.bezierCurveTo(-20,-8,-19,-4,-13,3);
  ictx.bezierCurveTo(-5,13,10,27,21,32);
  ictx.bezierCurveTo(28,36,33,35,36,28);
  ictx.bezierCurveTo(40,19,50,18,57,24);
  ictx.bezierCurveTo(70,36,65,57,47,62);
  ictx.bezierCurveTo(20,69,-45,8,-50,-18);
  ictx.closePath();
  ictx.fill();
  ictx.stroke();
  prep(5,9);
  ictx.beginPath();ictx.moveTo(-38,-20);ictx.lineTo(-21,-11);ictx.stroke();
  ictx.beginPath();ictx.moveTo(33,31);ictx.lineTo(48,45);ictx.stroke();
  prep(4,7);
  ictx.beginPath();
  ictx.moveTo(-20,1);
  ictx.bezierCurveTo(-5,20,11,34,31,43);
  ictx.stroke();
  // Animated call waves
  [{r:18,d:0},{r:32,d:0.18},{r:46,d:0.36}].forEach(({r,d})=>{
    const p=clamp((waveP-d)/0.58,0,1);if(p<=0)return;
    const draw=eout(p);
    ictx.save();ictx.globalAlpha=al*(1-p*0.18);prep(4,13);
    const startA=-Math.PI*0.78,endA=-Math.PI*0.18;
    ictx.beginPath();ictx.arc(13,-20,r,startA,lerp(startA,endA,draw));ictx.stroke();
    ictx.restore();
  });
  ictx.restore();
}

// -- BAR + LINE CHART --
function drawChart(ox,barP,lineP,al){
  ictx.save();ictx.globalAlpha=al;ictx.translate(CM+ox,CM);
  const base=46;
  const bars=[{x:-44,mh:30,w:18},{x:-16,mh:52,w:18},{x:12,mh:40,w:18},{x:40,mh:68,w:18}];
  const pts=[{x:-35,y:base-30},{x:-7,y:base-52},{x:21,y:base-40},{x:49,y:base-68}];
  // Bars
  bars.forEach((b,i)=>{
    const p=clamp((barP-i*0.13)/0.55,0,1);
    const h=b.mh*eout(p);
    ictx.save();ictx.globalAlpha=al*0.92;prep(0,10);
    ictx.fillStyle=Y;ictx.shadowBlur=0;
    ictx.beginPath();ictx.roundRect(b.x-b.w/2,base-h,b.w,h,[3,3,0,0]);ictx.fill();
    ictx.restore();
  });
  // Baseline
  prep(3,4);ictx.globalAlpha=al*0.3;
  ictx.beginPath();ictx.moveTo(-56,base);ictx.lineTo(58,base);ictx.stroke();
  // Line draws itself
  if(lineP>0){
    ictx.globalAlpha=al;prep(4,14);
    ictx.beginPath();ictx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++){
      const seg=(i-1)/(pts.length-1), segE=i/(pts.length-1);
      const sp=clamp((lineP-seg)/(segE-seg),0,1);if(sp<=0)break;
      ictx.lineTo(lerp(pts[i-1].x,pts[i].x,eout(sp)),lerp(pts[i-1].y,pts[i].y,eout(sp)));
    }
    ictx.stroke();
    pts.forEach((p,i)=>{
      const dp=clamp((lineP-i/(pts.length-1))/0.18,0,1);if(dp<=0)return;
      ictx.save();ictx.globalAlpha=al*eout(dp);prep(0,18);
      ictx.beginPath();ictx.arc(p.x,p.y,5.5,0,Math.PI*2);ictx.fill();ictx.restore();
    });
  }
  ictx.restore();
}

// -- IMPLODE helper --
function implode(drawFn, t) {
  // t: 0=full size, 1=gone. Gentle pop, then slide right and fade.
  const pop=clamp(t/0.18,0,1),slide=clamp((t-0.12)/0.88,0,1);
  const p=eout(slide);
  const sc=lerp(1,1.08,eout(pop))-(p*0.04);
  const al=Math.max(0,1-p);
  ictx.save();
  ictx.translate(lerp(0,64,p),0);
  ictx.translate(CM,CM);ictx.scale(sc,sc);ictx.translate(-CM,-CM);
  drawFn(al);
  ictx.restore();
}

// -- SCENES --
const IDLE=30;
const scenes=[
  {
    label:'Work', dur:4.4,
    render(t){
      ictx.clearRect(0,0,CW,CH);
      if(t<0.65){
        const p=eout(t/0.65);
        drawLaptop(lerp(-54,0,p),0.04,1,p);
      } else if(t<1.55){
        drawLaptop(0,(t-0.65)/0.9,1,1);
      } else if(t<3.35){
        drawLaptop(0,1,1,1);
      } else {
        implode((al)=>drawLaptop(0,1,1,al),(t-3.35)/1.05);
      }
    }
  },
  {
    label:'Connect', dur:4.7,
    render(t){
      ictx.clearRect(0,0,CW,CH);
      if(t<0.6){
        const p=eout(t/0.6);
        drawPhone(lerp(-54,0,p),0,p);
      } else if(t<3.9){
        const wt=((t-0.6)%1.35)/1.35;
        drawPhone(0,wt,1);
      } else {
        implode((al)=>drawPhone(0,1,al),(t-3.9)/0.8);
      }
    }
  },
  {
    label:'Growth', dur:5.2,
    render(t){
      ictx.clearRect(0,0,CW,CH);
      if(t<0.5){
        const p=eout(t/0.5);
        drawChart(lerp(-54,0,p),0,0,p);
      } else if(t<1.9){
        drawChart(0,(t-0.5)/1.4,0,1);
      } else if(t<3.8){
        drawChart(0,1,(t-1.9)/1.9,1);
      } else {
        implode((al)=>drawChart(0,1,1,al),(t-3.8)/1.4);
      }
    }
  }
];

let phase='idle',phaseTimer=0,sceneIdx=0,sceneTimer=0,lastTs=null;

function updateAnim(ts){
  if(!lastTs)lastTs=ts;
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;phaseTimer+=dt;
  if(phase==='idle'){
    showBrandWordmark(0.96);
    if(phaseTimer>=IDLE){phase='fadeout';phaseTimer=0;sceneIdx=0;sceneTimer=0;}
    return;
  }
  if(phase==='fadeout'){
    const t=Math.min(phaseTimer/0.4,1);
    logoSVG.style.opacity=String(1-t);ic.style.opacity=String(t);
    brandWordmark.style.opacity=String(1-t);
    setLabel('',0);
    ictx.clearRect(0,0,CW,CH);
    if(t>=1){phase='scene';phaseTimer=0;}return;
  }
  if(phase==='fadein'){
    const t=Math.min(phaseTimer/0.5,1);
    logoSVG.style.opacity=String(t);ic.style.opacity=String(1-t);
    brandWordmark.style.opacity=String(t*0.96);
    setLabel('',0);ictx.clearRect(0,0,CW,CH);
    if(t>=1){phase='idle';phaseTimer=0;showBrandWordmark(0.96);}return;
  }
  sceneTimer+=dt;
  const scene=scenes[sceneIdx];
  brandWordmark.style.opacity='0';
  setLabel(scene.label,clamp(sceneTimer/0.4,0,1)*0.85);
  scene.render(sceneTimer);
  if(sceneTimer>=scene.dur){
    sceneIdx++;sceneTimer=0;setLabel('',0);
    if(sceneIdx>=scenes.length){phase='fadein';phaseTimer=0;ictx.clearRect(0,0,CW,CH);}
  }
}

// -- CLOCK --
const CLK=document.getElementById('clock-canvas'),kctx=CLK.getContext('2d'),CX=110,CY=110,R=100;
const clockFace=document.createElement('canvas'),faceCtx=clockFace.getContext('2d');
clockFace.width=220;clockFace.height=220;
function drawClockFace(){
  faceCtx.clearRect(0,0,220,220);
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*2-Math.PI/2,q=i%5===0,ox=Math.cos(a),oy=Math.sin(a);
    faceCtx.beginPath();faceCtx.moveTo(CX+ox*(R-3),CY+oy*(R-3));
    faceCtx.lineTo(CX+ox*(R-3-(q?15:6)),CY+oy*(R-3-(q?15:6)));
    faceCtx.strokeStyle=q?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.42)';
    faceCtx.lineWidth=q?2.6:1.2;faceCtx.lineCap='round';faceCtx.stroke();
  }
}
drawClockFace();
function drawClock(){
  const now=new Date(),sec=now.getSeconds()+now.getMilliseconds()/1000,min=now.getMinutes()+sec/60,hr=(now.getHours()%12)+min/60;
  kctx.clearRect(0,0,220,220);
  kctx.drawImage(clockFace,0,0);
  function hand(angle,len,w,col){
    kctx.beginPath();kctx.moveTo(CX-Math.cos(angle)*14,CY-Math.sin(angle)*14);
    kctx.lineTo(CX+Math.cos(angle)*len,CY+Math.sin(angle)*len);
    kctx.strokeStyle=col;kctx.lineWidth=w;kctx.lineCap='round';
    kctx.stroke();
  }
  hand((hr/12)*Math.PI*2-Math.PI/2,R*0.48,7,'rgba(255,255,255,0.94)');
  hand((min/60)*Math.PI*2-Math.PI/2,R*0.72,4.5,'rgba(255,255,255,0.9)');
  hand((sec/60)*Math.PI*2-Math.PI/2,R*0.82,2.2,'rgba(255,198,0,0.98)');
  kctx.beginPath();kctx.arc(CX,CY,7,0,Math.PI*2);
  kctx.fillStyle='rgba(0,0,0,0.98)';kctx.fill();
  kctx.beginPath();kctx.arc(CX,CY,3.2,0,Math.PI*2);
  kctx.fillStyle='rgba(0,0,0,0.98)';kctx.fill();
}

// -- DIGITAL TIME --
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function updateDigital(){
  const now=new Date();let h=now.getHours();const m=now.getMinutes();
  const ap=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('digital-time').innerHTML=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}<span class="ampm">${ap}</span>`;
  document.getElementById('date-str').textContent=`${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}`;
}

// -- PARTICLES --
const PC=document.getElementById('particles-canvas'),pctx=PC.getContext('2d');
const particles=Array.from({length:PARTICLE_COUNT},()=>spawnP(true));
function spawnP(rnd){const size=1+Math.random()*3.5;return{x:Math.random()*1920,y:rnd?Math.random()*1080:1100,size,speed:0.35+Math.random()*1.3,drift:(Math.random()-0.5)*0.35,opacity:rnd?Math.random()*0.4:0,maxOp:0.12+Math.random()*0.5,fadeIn:0.004+Math.random()*0.008,fadeOut:0.002+Math.random()*0.005,life:rnd?'full':'in',fullCount:0,fullTime:200+Math.random()*600};}
function updateParticles(dt){
  pctx.clearRect(0,0,1920,1080);
  for(let i=0;i<particles.length;i++){
    const p=particles[i];p.y-=p.speed*dt*60*0.016;p.x+=p.drift*dt*60*0.016;
    if(p.life==='in'){p.opacity+=p.fadeIn*dt*60*0.016;if(p.opacity>=p.maxOp){p.opacity=p.maxOp;p.life='full';}}
    else if(p.life==='full'){p.fullCount+=dt*60*0.016;if(p.fullCount>=p.fullTime)p.life='out';}
    else{p.opacity-=p.fadeOut*dt*60*0.016;if(p.opacity<=0||p.y<-10){particles[i]=spawnP(false);continue;}}
    pctx.beginPath();pctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    pctx.fillStyle=`rgba(255,198,0,${p.opacity.toFixed(3)})`;pctx.fill();
  }
}

// -- MAIN LOOP --
let loopLast=performance.now(),renderLast=0;
function loop(ts){
  if(renderLast&&ts-renderLast<FRAME_MS-1){requestAnimationFrame(loop);return;}
  const dt=Math.min((ts-loopLast)/16.667,3);loopLast=ts;
  renderLast=ts;
  updateAnim(ts);updateParticles(dt);drawClock();
  requestAnimationFrame(loop);
}
updateDigital();setInterval(updateDigital,1000);requestAnimationFrame(loop);
</script>
